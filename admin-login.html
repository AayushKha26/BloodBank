<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Gateway - BloodCare</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔒</text></svg>">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, rgba(15, 3, 6, 0.95), rgba(192, 0, 26, 0.95)), url('https://images.unsplash.com/photo-1615461066159-fea0960485d5?q=80&w=2000&auto=format&fit=crop') center/cover;
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
        }
        .login-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .login-logo {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 900;
            color: var(--blood);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .login-box h2 {
            font-family: 'DM Sans', sans-serif;
            font-size: 20px;
            color: #333;
            margin-bottom: 25px;
        }
        .bbform {
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <div class="login-logo">🩸 BloodCare</div>
        <h2>Admin Gateway</h2>
        
        <form class="bbform" id="adminLoginForm">
            <div class="form-group full">
                <label style="color: #666;">Staff Username</label>
                <input type="text" id="username" placeholder="e.g., admin" required style="background: white;">
            </div>
            <div class="form-group full">
                <label style="color: #666;">Password</label>
                <input type="password" id="password" placeholder="••••••••" required style="background: white;">
            </div>
            <button type="submit" class="btn-primary full-btn" style="margin-top: 15px;">Secure Login</button>
            <p id="errorMsg" style="color: var(--blood); font-weight: 500; text-align: center; margin-top: 15px; display: none;">Invalid credentials</p>
        </form>
        <a href="index.html" style="display: block; margin-top: 25px; color: #666; text-decoration: none; font-size: 14px;">← Back to Public Site</a>
    </div>

    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.textContent = 'Authenticating...';
            btn.disabled = true;

            const name = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, password: pass })
                });

                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('adminToken', data.token);
                    window.location.href = 'admin.html';
                } else {
                    document.getElementById('errorMsg').style.display = 'block';
                    btn.textContent = 'Secure Login';
                    btn.disabled = false;
                }
            } catch (err) {
                document.getElementById('errorMsg').textContent = 'Server connection failed';
                document.getElementById('errorMsg').style.display = 'block';
                btn.textContent = 'Secure Login';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
