<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login - BloodCare</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👤</text></svg>">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, rgba(29, 38, 113, 0.95), rgba(195, 55, 100, 0.95)), url('https://images.unsplash.com/photo-1579684385127-1ef15d508118?q=80&w=2000&auto=format&fit=crop') center/cover;
            font-family: 'DM Sans', sans-serif;
        }
        .login-box {
            background: rgba(255, 255, 255, 0.98);
            padding: 40px 40px;
            border-radius: 20px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        .login-logo {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 900;
            color: var(--blood);
            margin-bottom: 30px;
        }
        .type-selector {
            display: flex;
            background: #f0f0f0;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 25px;
        }
        .type-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-weight: 600;
            color: #666;
            transition: 0.3s;
        }
        .type-btn.active {
            background: var(--blood);
            color: white;
        }
        .bbform { text-align: left; }
    </style>
</head>
<body>

    <div class="login-box">
        <div class="login-logo">🩸 BloodCare Portal</div>
        
        <div class="type-selector">
            <button class="type-btn active" onclick="switchType('donor')">Donor Login</button>
            <button class="type-btn" onclick="switchType('hospital')">Hospital Login</button>
        </div>

        <form class="bbform" id="portalLoginForm">
            <div class="form-group full">
                <label style="color: #444;" id="idLabel">Phone Number</label>
                <input type="tel" id="identifier" placeholder="+91 98765 43210" required style="background: #fafafa;">
            </div>
            <div class="form-group full">
                <label style="color: #444;">Password</label>
                <input type="password" id="password" placeholder="••••••••" required style="background: #fafafa;">
            </div>
            <button type="submit" class="btn-primary full-btn" style="margin-top: 15px;">Access Dashboard</button>
            <p id="errorMsg" style="color: var(--blood); font-weight: 500; text-align: center; margin-top: 15px; display: none;">Invalid credentials</p>
        </form>
        <a href="index.html" style="display: block; margin-top: 25px; color: #888; text-decoration: none; font-size: 14px;">← Back to Home</a>
    </div>

    <script>
        let currentType = 'donor';
        
        function switchType(type) {
            currentType = type;
            document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('idLabel').textContent = type === 'donor' ? 'Phone Number' : 'Hospital Phone Contact';
        }

        document.getElementById('portalLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.textContent = 'Verifying...';
            btn.disabled = true;

            const identifier = document.getElementById('identifier').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/portal/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: currentType, identifier, password })
                });

                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('userToken', data.token);
                    window.location.href = 'portal.html';
                } else {
                    document.getElementById('errorMsg').style.display = 'block';
                    btn.textContent = 'Access Dashboard';
                    btn.disabled = false;
                }
            } catch (err) {
                document.getElementById('errorMsg').textContent = 'Server connection failed';
                document.getElementById('errorMsg').style.display = 'block';
                btn.textContent = 'Access Dashboard';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
